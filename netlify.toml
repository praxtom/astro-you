[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Secret scanning stays ON. The VITE_* values below are public by design
  # (Firebase web config + Razorpay *public* key id) and are meant to ship in
  # the client bundle, so we omit only those known-public keys rather than
  # disabling detection for genuinely sensitive secrets (service account,
  # Razorpay SECRET, Gemini/Astrology/Resend keys, webhook secret).
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_VAPID_KEY,VITE_RAZORPAY_KEY_ID"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Firebase Auth reverse proxy - enables signInWithRedirect on Netlify
[[redirects]]
  from = "/__/auth/*"
  to = "https://astro-you.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

# SPA fallback for production
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Security headers ──────────────────────────────────────────────
# Applied to every response. CSP allows: self, Razorpay checkout, Firebase
# (auth/firestore/storage/installations/FCM), and Google Fonts. 'unsafe-inline'
# for scripts is required while Vite injects inline module bootstrap; tighten to
# nonce-based once that's removed.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # script-src blob: — troika (3D chart text) loads its worker code via
    # importScripts(blobUrl); connect-src cdn.jsdelivr.net — troika's fallback
    # glyph-coverage data for characters missing from the self-hosted font.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://checkout.razorpay.com https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://cdn.jsdelivr.net https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com https://firebasestorage.googleapis.com https://lumberjack.razorpay.com https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com https://astro-you.firebaseapp.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
